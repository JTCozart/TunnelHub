name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish server (self-contained linux-x64)
        run: |
          dotnet publish src/Ztpr.Server -c Release -r linux-x64 \
            --self-contained true -o out/ztpr

      - name: Publish clients
        run: |
          dotnet publish src/Ztpr.Client -c Release -r linux-x64 \
            --self-contained true -p:PublishSingleFile=true -o out/client-linux
          dotnet publish src/Ztpr.Client -c Release -r win-x64 \
            --self-contained true -p:PublishSingleFile=true -o out/client-win
          mkdir -p out/ztpr/wwwroot/downloads
          cp out/client-linux/Ztpr.Client out/ztpr/wwwroot/downloads/ztpr-linux-x64
          cp out/client-win/Ztpr.Client.exe out/ztpr/wwwroot/downloads/ztpr-win-x64.exe

      - name: Bundle installer
        run: |
          cp deploy/install.sh out/ztpr/install.sh
          cp deploy/update.sh out/ztpr/update.sh
          cp deploy/ztpr.service out/ztpr/ztpr.service
          # Bake the repo + version into the bundle so update.sh can self-check.
          sed -i "s|OWNER/REPO|${{ github.repository }}|g" out/ztpr/update.sh
          echo "${{ github.ref_name }}" > out/ztpr/VERSION
          chmod +x out/ztpr/install.sh out/ztpr/update.sh out/ztpr/Ztpr.Server
          # The bundle already contains the Windows/Linux client downloads under
          # wwwroot/downloads (added in the previous step).
          tar -C out -czf ztpr-linux-x64.tar.gz ztpr

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            ztpr-linux-x64.tar.gz \
            out/ztpr/wwwroot/downloads/ztpr-win-x64.exe \
            out/ztpr/wwwroot/downloads/ztpr-linux-x64 \
            --title "${{ github.ref_name }}" \
            --generate-notes

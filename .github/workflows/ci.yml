name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore TunnelHub.sln

      - name: Build
        run: dotnet build TunnelHub.sln -c Release --no-restore

      - name: Test
        run: dotnet test TunnelHub.sln -c Release --no-build --verbosity normal
